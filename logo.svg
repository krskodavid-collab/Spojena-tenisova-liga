<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <radialGradient id="ballGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d9ff3d"/>
      <stop offset="60%" stop-color="#a8e10c"/>
      <stop offset="100%" stop-color="#5d8a00"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tennis ball -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <circle r="46" fill="url(#ballGrad)"/>
    <!-- seams -->
    <path d="M -42,-18 Q -10,-46 22,-44 Q 40,-42 46,-22"
          stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95"/>
    <path d="M -46,22 Q -22,42 6,44 Q 32,46 42,18"
          stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- subtle inner shine -->
    <ellipse cx="-14" cy="-14" rx="14" ry="10" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900">
    <text x="125" y="55" font-size="32" fill="url(#textGrad)" letter-spacing="2">SPOJENÁ</text>
    <text x="125" y="88" font-size="22" fill="#a8e10c" letter-spacing="3">TENISOVÁ LIGA</text>
  </g>

  <!-- Accent line -->
  <line x1="125" y1="64" x2="380" y2="64" stroke="#1f2937" stroke-width="1"/>
</svg>
